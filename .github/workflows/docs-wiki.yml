name: Publish docs to Wiki

on:
  push:
    branches: [develop, master]
    paths:
      - "doc/**"
      - "tools/docgen/**"
      - ".github/workflows/docs-wiki.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: false

      - name: Check out Wiki repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}.wiki
          path: .wiki
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Render wiki pages
        run: |
          # Remove all existing generated pages (prefix-based) so deletions
          # in doc/ propagate to the wiki. Preserve pages that were authored
          # directly on the wiki (no Class./Guide./Home./_Docs- prefix).
          shopt -s nullglob
          for f in .wiki/Class.*.md .wiki/Guide.*.md .wiki/Home.md .wiki/_Docs-Diff-Report.md; do
            rm -f "$f"
          done
          python tools/docgen/sync_wiki.py .wiki

      - name: Commit and push
        working-directory: .wiki
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "no wiki changes"
            exit 0
          fi
          git commit -m "docs: sync from ${GITHUB_SHA::7}"
          git push
